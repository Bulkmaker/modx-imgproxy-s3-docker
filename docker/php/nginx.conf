# Зона кеша для обработанных картинок (http-контекст; файл подключается в http{} через sites-enabled)
proxy_cache_path /var/cache/imgproxy levels=1:2 keys_zone=imgproxy:10m max_size=500m inactive=7d;

server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    client_max_body_size 64m;

    # Относительные редиректы — корректно работает за обратным прокси (Traefik/CDN)
    absolute_redirect off;

    gzip on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Встроенный DNS Docker — чтобы имя сервиса imgproxy резолвилось в рантайме,
    # а не при старте nginx (иначе nginx не поднимется, если imgproxy ещё/уже недоступен)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Закрыть служебную папку MODX
    location /core/ { deny all; }

    # ── Картинки через imgproxy ──────────────────────────────────────────────
    # /img/w:640/<path>            → ресайз по ширине, webp
    # /img/w:640:h:480/<path>      → ресайз с кропом (fill), webp
    # /img/w:640:h:480:q:90/<path> → + качество
    # /img/orig/<path>             → оригинал без обработки
    # ${S3_BUCKET} подставляется из .env при старте контейнера (envsubst).
    location ^~ /img/ {
        rewrite ^/img/w:(\d+)/(.+)$
            /unsafe/rs:fit:$1:0/plain/s3://${S3_BUCKET}/$2@webp break;
        rewrite ^/img/w:(\d+):h:(\d+)/(.+)$
            /unsafe/rs:fill:$1:$2/plain/s3://${S3_BUCKET}/$3@webp break;
        rewrite ^/img/w:(\d+):h:(\d+):q:(\d+)/(.+)$
            /unsafe/rs:fill:$1:$2/q:$3/plain/s3://${S3_BUCKET}/$4@webp break;
        rewrite ^/img/orig/(.+)$
            /unsafe/raw:true/plain/s3://${S3_BUCKET}/$1 break;

        # upstream через переменную → nginx резолвит imgproxy в рантайме (см. resolver выше)
        set $imgproxy_upstream http://imgproxy:8080;
        proxy_pass $imgproxy_upstream;
        proxy_cache imgproxy;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_key "$uri";
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
        expires 30d;
        access_log off;
    }

    # ── MODX Friendly URLs ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ @rewrite;
    }
    location @rewrite {
        rewrite ^/(.+)/$ /$1 permanent;
        rewrite ^/(.*)$ /index.php?q=$1 last;
    }

    # PHP через FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_read_timeout 120;
    }

    # Кеш статики (локальные ассеты темы/компонентов)
    location ~* ^.+\.(jpg|jpeg|png|gif|webp|ico|svg|css|js|woff|woff2|ttf|eot|mp4|bmp)$ {
        expires 30d;
        access_log off;
        break;
    }

    location ~ /\.ht { deny all; }
}
